<VirtualHost *:80>
# VirtualHost exposant le frontend et redirigeant l'API vers FastAPI
    ServerName pdftools.local
    DocumentRoot /opt/pdftools/frontend

    <Directory /opt/pdftools/frontend>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Security headers including CSP with frame-ancestors
        Header always set Content-Security-Policy "default-src 'none'; base-uri 'self'; form-action 'self'; font-src 'self'; img-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; frame-ancestors 'none';"
        Header always set X-Frame-Options "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </Directory>

    # Proxy /api vers FastAPI
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    # Taille max upload et timeout
    LimitRequestBody 104857600
    Timeout 60

    ErrorLog ${APACHE_LOG_DIR}/pdftools_error.log
    CustomLog ${APACHE_LOG_DIR}/pdftools_access.log combined
</VirtualHost>