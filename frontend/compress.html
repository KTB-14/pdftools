<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR & Compression – PDFTools</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <meta name="description" content="Compressez vos PDF et ajoutez une couche OCR pour les rendre consultables" />
</head>
<body>

  <!-- Header bordeaux harmonisé -->
  <header class="header-container">
    <a href="index.html" class="return-button">← Retour à l'accueil</a>
    <h1>OCR & Compression PDF</h1>
  </header>
  <div class="header-space"></div>

  <main class="upload-section container">
    <!-- Zone de dépôt -->
    <div id="dropzone" class="dropzone">
      <p>Glissez-déposez vos fichiers PDF ici<br/><span class="text-sm text-gray-500">ou</span></p>
      <button id="selectFile" class="dashboard-button">Sélectionner un ou plusieurs fichiers</button>
      <input type="file" id="fileInput" accept="application/pdf" multiple hidden />
      <p class="text-sm text-gray-500 mt-4">Format accepté : PDF uniquement</p>
    </div>

    <!-- Zone de statut -->
    <div id="status" class="status hidden">
      <div class="spinner"></div>
      <p id="statusText">En attente...</p>
    </div>

    <!-- Bouton de téléchargement -->
    <div id="downloadLink" class="hidden">
      <a id="resultLink" href="#" class="dashboard-button" title="Cliquez pour télécharger vos fichiers PDF traités">
        📥 Télécharger les fichiers PDF
      </a>
    </div>
  </main>

  <footer>
    <small>© FAREVA PDFTools </small>
  </footer>

  <script src="assets/js/compress.js"></script>
</body>
</html>
