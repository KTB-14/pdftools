<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR & Compression – PDFTools</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <h1>OCR & Compression PDF</h1>
    <a href="index.html" class="back">← Retour à l'accueil</a>
  </header>

  <main class="upload-section">
    <!-- Zone de dépôt + bouton de sélection -->
    <div id="dropzone" class="dropzone">
      <p>Sélectionner un ou plusieurs fichiers PDF</p>
      <button id="selectFile">Choisir des fichiers</button>
      <input type="file" id="fileInput" accept="application/pdf" multiple hidden />
    </div>

    <!-- Liste des fichiers en cours de traitement -->
    <ul id="fileStatusList" class="hidden"></ul>

    <!-- Bouton de téléchargement global -->
    <div id="downloadAllContainer" class="hidden" style="text-align: center; margin-top: 1rem;">
      <button id="downloadAllBtn" class="download-all-btn">📥 Télécharger tous les fichiers</button>
    </div>
  </main>

  <footer>
    <small>© FAREVA – Utilitaires Compréssion PDF</small>
  </footer>

  <script src="assets/js/compress.js"></script>
</body>
</html>
