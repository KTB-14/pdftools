<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR & Compression – PDFTools</title>
  <link rel="stylesheet" href="assets/css/compress.css" />
  <meta name="description" content="Compressez vos PDF et ajoutez une couche OCR pour les rendre consultables" />
</head>
<body>

  <header class="header-banner">
    <a href="index.html" class="return-button">← Retour à l'accueil</a>
    <h1>OCR & Compression PDF</h1>
  </header>

  <main class="upload-section">
    <div id="dropzone" class="dropzone">
      <p>Glissez-déposez vos fichiers PDF ici<br/><span class="text-muted">ou</span></p>
      <button id="selectFile" class="dashboard-button">Sélectionner un ou plusieurs fichiers</button>
      <input type="file" id="fileInput" accept="application/pdf" multiple hidden />
      <p class="text-muted">Format accepté : PDF uniquement</p>
    </div>

    <div id="status" class="status hidden">
      <div class="spinner"></div>
      <p id="statusText">En attente...</p>
    </div>

    <div id="downloadLink" class="hidden">
      <a id="resultLink" href="#" class="dashboard-button" title="Cliquez pour télécharger tous les fichiers PDF traités">
        📥 Télécharger les fichiers PDF
      </a>
    </div>
  </main>

  <footer>
    <small style="text-align: center; display: block; padding: 2rem; color: #777;">© FAREVA PDFTools</small>
  </footer>

  <script src="assets/js/compress.js"></script>
</body>
</html>
